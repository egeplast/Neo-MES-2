<div
  class="h-full bg-white border-r border-slate-200 flex flex-col py-4 transition-all duration-200"
  [class]="collapsed ? 'w-14' : 'w-56'"
>
  <div class="px-2 flex justify-end flex-shrink-0 mb-2">
    <button
      (click)="collapsed = !collapsed"
      class="cursor-pointer w-8 h-8 flex items-center justify-center rounded-lg text-slate-400 hover:text-[#006db7] hover:bg-[#e0f2fe] transition-colors"
      [title]="collapsed ? 'Sidebar ausklappen' : 'Sidebar einklappen'"
    >
      <svg
        class="w-5 h-5 transition-transform duration-200"
        [class.rotate-180]="collapsed"
        viewBox="0 0 24 24"
        fill="currentColor"
      >
        <path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z" />
      </svg>
    </button>
  </div>

  <div class="flex-1 overflow-y-auto min-h-0">
    <div class="flex flex-col gap-0.5">
      <ng-container
        *ngTemplateOutlet="navList; context: { $implicit: visibleElements(), depth: 0 }"
      ></ng-container>
    </div>
  </div>

  <ng-template #navList let-items let-depth="depth">
    @for (el of items; track el.title + (el.link ?? '')) {
    <div
      class="relative flex items-center select-none"
      [class]="collapsed ? 'px-1' : 'px-3'"
    >
      <div
        (click)="onItemClick(el, $event)"
        class="flex flex-1 items-center gap-3 rounded-lg transition-colors cursor-pointer"
        [class]="isBranchActive(el) ? 'bg-[#e0f2fe]' : 'hover:bg-slate-50'"
        [class.px-3]="!collapsed"
        [class.py-2]="true"
        [class.justify-center]="collapsed"
        [style.padding-left.px]="collapsed ? null : 12 + depth * 16"
        [title]="collapsed ? el.title : ''"
      >
        <span
          class="w-5 h-5 flex items-center justify-center transition-colors sidebar-icon flex-shrink-0"
          [style.color]="isBranchActive(el) ? '#006db7' : '#94a3b8'"
          [style.fill]="isBranchActive(el) ? '#006db7' : '#94a3b8'"
          [innerHTML]="sanitizeIcon(el.icon)"
        ></span>
        @if (!collapsed) {
        <span
          class="flex-1 text-sm transition-colors truncate"
          [class]="
                isBranchActive(el) ? 'font-bold text-[#006db7]' : 'font-medium text-slate-700'
              "
          >{{ el.title }}</span
        >
        @if (hasChildren(el)) {
        <span
          class="w-5 h-5 flex items-center justify-center flex-shrink-0 text-slate-400"
        >
          <svg
            class="w-4 h-4 transition-transform duration-200"
            [class.rotate-180]="isExpanded(el)"
            viewBox="0 0 24 24"
            fill="currentColor"
          >
            <path d="M16.59 8.59L12 13.17 7.41 8.59 6 10l6 6 6-6z" />
          </svg>
        </span>
        } }
      </div>
      @if (isBranchActive(el)) {
      <div class="absolute right-0 w-1 h-5 bg-[#006db7] rounded-l-full"></div>
      }
    </div>
    @if (!collapsed && hasChildren(el) && isExpanded(el)) {
    <ng-container
      *ngTemplateOutlet="navList; context: { $implicit: el.children, depth: depth + 1 }"
    ></ng-container>
    } }
  </ng-template>

  <div
    class="flex-shrink-0 border-t border-slate-100 pt-2 mt-2"
    [class]="collapsed ? 'px-1' : 'px-3'"
  >
    <button
      (click)="cycleTheme()"
      [title]="collapsed ? ('Theme: ' + themeStore.mode()) : ''"
      class="cursor-pointer flex items-center gap-3 w-full rounded-lg py-2 transition-colors text-slate-500 hover:bg-slate-100 hover:text-slate-700"
      [class.px-3]="!collapsed"
      [class.justify-center]="collapsed"
    >
      <span
        class="w-5 h-5 flex items-center justify-center sidebar-icon flex-shrink-0"
      >
        @switch (themeStore.mode()) { @case ('light') {
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="currentColor"
          class="w-5 h-5"
        >
          <path
            d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0 .39-.39.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0 .39-.39.39-1.03 0-1.41l-1.06-1.06zm1.06-10.96c.39-.39.39-1.03 0-1.41-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41.39.39 1.03.39 1.41 0l1.06-1.06zM7.05 18.36c.39-.39.39-1.03 0-1.41-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41.39.39 1.03.39 1.41 0l1.06-1.06z"
          />
        </svg>
        } @case ('dark') {
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="currentColor"
          class="w-5 h-5"
        >
          <path
            d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"
          />
        </svg>
        } @default {
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="currentColor"
          class="w-5 h-5"
        >
          <path
            d="M20 3H4c-1.1 0-2 .9-2 2v11c0 1.1.9 2 2 2h3l-1 1v2h12v-2l-1-1h3c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 13H4V5h16v11z"
          />
        </svg>
        } }
      </span>
      @if (!collapsed) {
      <span class="text-sm font-medium truncate flex-1 text-left">
        @switch (themeStore.mode()) { @case ('light') { Hell } @case ('dark') {
        Dunkel } @default { System } }
      </span>
      }
    </button>
  </div>

  <div
    class="flex-shrink-0 border-t border-slate-100 pt-2 mt-2"
    [class]="collapsed ? 'px-1' : 'px-3'"
  >
    <button
      (click)="logout()"
      [title]="collapsed ? 'Abmelden' : ''"
      class="cursor-pointer flex items-center gap-3 w-full rounded-lg py-2 transition-colors text-slate-500 hover:bg-red-50 hover:text-red-700"
      [class.px-3]="!collapsed"
      [class.justify-center]="collapsed"
    >
      <span
        class="w-5 h-5 flex items-center justify-center sidebar-icon flex-shrink-0"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="currentColor"
          class="w-5 h-5"
        >
          <path
            d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"
          />
        </svg>
      </span>
      @if (!collapsed) {
      <span class="text-sm font-medium truncate">Abmelden</span>
      }
    </button>
  </div>
</div>
